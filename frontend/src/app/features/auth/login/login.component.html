<div class="login-wrapper">
  <div class="login-hero">
    <mat-icon class="hero-icon">factory</mat-icon>
    <h1>Tecnoglass</h1>
    <p>Sistema de Trazabilidad de Producción</p>
  </div>

  <mat-card class="login-card mat-elevation-z4">
    <mat-card-header>
      <mat-card-title>Iniciar sesión</mat-card-title>
      <mat-card-subtitle>Accede con tus credenciales</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()" autocomplete="on">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Usuario</mat-label>
          <input matInput formControlName="username"
                 autocomplete="username" placeholder="Ej: operario1">
          <mat-icon matSuffix>person</mat-icon>
          <mat-error *ngIf="form.get('username')?.hasError('required')">
            El usuario es obligatorio.
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input matInput [type]="hidePass ? 'password' : 'text'"
                 formControlName="password" autocomplete="current-password">
          <button mat-icon-button matSuffix type="button"
                  (click)="hidePass = !hidePass" [attr.aria-label]="'Toggle password'">
            <mat-icon>{{ hidePass ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="form.get('password')?.hasError('required')">
            La contraseña es obligatoria.
          </mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit"
                class="full-width login-btn" [disabled]="loading || form.invalid">
          <mat-spinner diameter="18" *ngIf="loading" class="btn-spinner"></mat-spinner>
          <mat-icon *ngIf="!loading">login</mat-icon>
          {{ loading ? 'Ingresando...' : 'Ingresar' }}
        </button>

      </form>
    </mat-card-content>
  </mat-card>
</div>
